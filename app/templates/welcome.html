{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 text-center space-y-6">
    <h1 class="text-4xl font-semibold tracking-tight text-gray-900">Manage your day, beautifully.</h1>
    <p class="text-gray-500">A clean, focused workspace for your tasks and schedule.</p>
    
    <div class="pt-6 flex gap-4 justify-center">
        <a href="{{ url_for('auth.register') }}" class="bg-brand-900 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-800 transition">Create Account</a>
        <a href="{{ url_for('auth.login') }}" class="bg-white border border-gray-200 text-gray-900 px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition shadow-sm">Sign In</a>
    </div>
</div>
{% endblock %}
