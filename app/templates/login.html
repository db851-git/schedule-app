{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <form method="POST" class="glass-card p-8 rounded-2xl shadow-sm space-y-4">
        <h2 class="text-2xl font-semibold tracking-tight text-gray-900 mb-6 text-center">Welcome back</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-50 text-red-800 text-xs p-3 rounded-md mb-4">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" name="email" required class="w-full border-gray-200 rounded-lg text-sm px-3 py-2 border shadow-sm outline-none focus:border-brand-900">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required class="w-full border-gray-200 rounded-lg text-sm px-3 py-2 border shadow-sm outline-none focus:border-brand-900">
        </div>
        <button type="submit" class="w-full bg-brand-900 text-white rounded-lg py-2 mt-4 text-sm font-medium hover:bg-gray-800 transition">Sign In</button>
        <p class="text-center text-xs text-gray-500 mt-4">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-brand-900 font-medium hover:underline">Sign up</a></p>
    </form>
</div>
{% endblock %}
